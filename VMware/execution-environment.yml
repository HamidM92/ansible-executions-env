version: 3

dependencies:
  # ansible core and ansible runner must be installed on the base image first  so that ansible can install rest of the python packages using the requirements file
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner

  python: requirements.txt
  galaxy: required-collections.yml
  system: bindep.txt

images:
  base_image:
    name: quay.io/centos/centos:stream9
